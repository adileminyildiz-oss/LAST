       'La Société ne sera pas dissoute par le décès, la déconfiture, la faillite, la banqueroute, la liquidation ou le règlement judiciaire d\'un associé.']));
    A.push('<div class="st-titre">TITRE DEUXIÈME — APPORTS · CAPITAL SOCIAL · PARTS SOCIALES</div>');
    var apports=assoc.map(function(a){var p=Number(a.parts)||0;var m=(nominal&&p)?stNum(nominal*p):'«…»';return '<p>'+(esc((a.nom||'').trim())||'«associé»')+' apporte à la Société une somme en numéraire de '+m+' euros.</p>';}).join('');
    A.push('<div class="st-art">ARTICLE 6 — Apports</div><p>Les apports faits par les associés sont les suivants :</p>'+apports
      +'<p>Soit au total '+capN+' euros. Cette somme sera déposée ultérieurement sur un compte ouvert au nom de la Société à la Banque sur demande du Gérant.</p>');
    var repart=assoc.map(function(a){var p=Number(a.parts)||0;return '<p>'+(esc((a.nom||'').trim())||'«associé»')+' détient '+(p||'«…»')+' parts</p>';}).join('');
    A.push('<div class="st-art">ARTICLE 7 — Capital social · Parts sociales</div>'
      +'<p>Le capital social est fixé à '+capN+' euros. Il est divisé en '+nbParts+' parts sociales de '+stNum(nominal)+' euros chacune.</p>'
      +'<p>Ce capital social est réparti de la façon suivante :</p>'+repart+'<p>Total : '+nbParts+' parts.</p>');
    A.push(art('ARTICLE 8 — Augmentation et réduction du capital',
      ['Le capital social pourra être augmenté en une ou plusieurs fois, en vertu d\'une décision prise par les associés, notamment par la création de parts nouvelles attribuées en représentation d\'apports en nature ou en numéraire. Il pourra aussi à toute époque être réduit, soit par retrait d\'apports, soit par des remboursements égaux sur toutes les parts sociales, ou par rachat et annulation de parts sociales, le tout par décision collective des associés.']));
    A.push(art('ARTICLE 9 — Représentation des parts sociales',
      ['Les parts sociales ne peuvent être représentées par des titres négociables. Les droits de chaque associé dans la société résultent seulement des présentes, des actes modificatifs ultérieurs et des cessions de parts régulièrement consenties, constatées et publiées.']));
    A.push(art('ARTICLE 10 — Cession entre vifs des parts sociales',
      ['Les parts sociales sont librement cessibles entre associés. Elles ne peuvent être cédées à titre onéreux ou gratuit, à quelque cessionnaire que ce soit, y compris le conjoint, ascendant ou descendant du cédant, qu\'avec le consentement des associés représentant au moins les deux tiers des parts sociales, cette majorité étant déterminée en tenant compte de la personne et des parts du cédant.',
       'La cession de parts sociales doit être constatée par écrit. Elle n\'est opposable à la société qu\'après avoir été signifiée à cette dernière ou acceptée par elle dans un acte authentique conformément à l\'article 1690 du Code civil.']));
    A.push(art('ARTICLE 11 — Décès ou retrait d\'un associé',
      ['La Société n\'est pas dissoute par le décès de l\'un des associés mais continue entre les associés survivants et les héritiers ou ayants droit de l\'associé décédé, sous réserve de leur agrément.',
       'Sans préjudice des droits des tiers, un associé peut se retirer totalement ou partiellement de la Société après autorisation donnée à l\'unanimité des autres associés, ou pour justes motifs par une décision de justice.']));
    A.push(art('ARTICLE 12 — Droits attachés aux parts sociales',
      ['Chaque part sociale confère un droit égal dans les bénéfices de la Société et dans tout l\'actif social. Les droits et obligations attachés aux parts sociales les suivent dans quelque main qu\'elles passent. La propriété d\'une part emporte de plein droit adhésion aux statuts et aux décisions régulièrement prises par les associés.',
       'Chaque part sociale est indivisible à l\'égard de la Société. Les copropriétaires indivis sont tenus, pour l\'exercice de leurs droits, de se faire représenter par un mandataire unique.']));
    A.push(art('ARTICLE 13 — Responsabilité des associés',
      ['À l\'égard des tiers, chacun des associés n\'est tenu indéfiniment des dettes sociales que dans la proportion du nombre de parts qu\'il possède à la date de l\'exigibilité ou au jour de la cessation des paiements, conformément aux dispositions de l\'article 1857 du Code civil. En outre, il sera fait application des articles 1858, 1859 et 1860 du Code civil.']));
    A.push('<div class="st-titre">TITRE TROISIÈME — ADMINISTRATION DE LA SOCIÉTÉ</div>');
    A.push('<div class="st-art">ARTICLE 14 — Gérance : nomination et durée des fonctions</div>'
      +'<p>La Société est administrée par un ou plusieurs Gérants, associés ou non, personnes physiques ou morales, désignés par décision collective des associés représentant plus de la moitié du capital social.</p>'
      +'<p>'+esc(gerant)+' est nommé(e) Gérant de la Société civile immobilière pour une durée illimitée. Il/elle déclare accepter ces fonctions et n\'être soumis(e) à aucune mesure pouvant lui en interdire l\'exercice.</p>');
    A.push(art('ARTICLE 15 — Pouvoirs de la gérance',
      ['Dans les rapports entre associés, le Gérant peut accomplir tous les actes de gestion que demande l\'intérêt de la Société.',
       'Dans les rapports avec les tiers, le Gérant jouit des pouvoirs les plus étendus pour agir au nom de la Société et faire ou autoriser tous les actes et opérations entrant dans l\'objet social.',
       'En cas de pluralité de Gérants, chacun exerce séparément ces pouvoirs, sauf le droit de chacun d\'eux de s\'opposer à une opération avant qu\'elle ne soit conclue.']));
    A.push(art('ARTICLE 16 — Responsabilité du Gérant',
      ['Chaque Gérant est responsable individuellement envers la Société et envers les tiers, soit des infractions aux lois et règlements, soit de la violation des statuts, soit des fautes commises dans la gestion. Si plusieurs Gérants ont participé aux mêmes faits, leur responsabilité est solidaire à l\'égard des tiers et des associés.']));
    A.push('<div class="st-titre">TITRE QUATRIÈME — DÉCISIONS COLLECTIVES</div>');
    A.push(art('ARTICLE 17 — Objet',
      ['Les décisions collectives des associés ont notamment pour objet d\'approuver les comptes sociaux, d\'autoriser le(s) Gérant(s) pour des opérations excédant leurs pouvoirs, de nommer et révoquer le(s) Gérant(s) et de modifier les statuts.']));
    A.push(art('ARTICLE 18 — Modes de consultation',
      ['La volonté des associés s\'exprime par des décisions collectives qui obligent les associés, même absents, dissidents ou incapables. Ces décisions peuvent résulter soit d\'une assemblée générale, soit du consentement de tous les associés exprimé dans un acte.']));
    A.push(art('ARTICLE 19 — Décisions collectives ordinaires',
      ['Sont qualifiées d\'ordinaires les décisions des associés ne concernant ni les modifications statutaires, ni l\'agrément de nouveaux associés. Les décisions collectives ordinaires doivent, pour être valables, être adoptées par un ou plusieurs associés représentant plus de la moitié du capital social.']));
    A.push(art('ARTICLE 20 — Décisions collectives extraordinaires',
      ['Sont qualifiées d\'extraordinaires les décisions des associés portant agrément de nouveaux associés ou modification des statuts. Elles ne peuvent être valablement prises qu\'à l\'unanimité s\'il s\'agit de changer la nationalité de la Société ou d\'augmenter les engagements d\'un associé, et, dans tous les autres cas, avec le consentement des associés représentant au moins les deux tiers du capital social.']));
    A.push('<div class="st-titre">TITRE CINQUIÈME — EXERCICE SOCIAL · COMPTES · AFFECTATION DES BÉNÉFICES</div>');
    A.push(art('ARTICLE 21 — Exercice social',
      ['Chaque exercice social a une durée d\'une année qui commence le 1er janvier et finit le 31 décembre.',
       'Par exception, le premier exercice social comprendra le temps à courir depuis l\'immatriculation de la Société jusqu\'au 31 décembre '+annee+'.']));
    A.push(art('ARTICLE 22 — Comptes',
      ['À la clôture de chaque exercice, il est dressé par les soins de la gérance un inventaire de l\'actif et du passif de la société, un compte d\'exploitation générale, un compte de pertes et profits et un bilan.',
       'Les associés sont réunis dans les six mois de la clôture de l\'exercice pour statuer sur les comptes de l\'exercice et l\'affectation des résultats.']));
    A.push(art('ARTICLE 23 — Affectation et répartition du bénéfice',
      ['Le bénéfice dégagé pour la période de référence est réparti entre les associés à proportion de leur participation dans le capital. Toutefois, les associés peuvent reporter à nouveau tout ou partie de la part leur revenant, ou l\'affecter à toutes réserves. Les pertes, s\'il en existe, sont supportées par les associés proportionnellement au nombre de parts leur appartenant.']));
    A.push('<div class="st-titre">TITRE SIXIÈME — DISSOLUTION · LIQUIDATION</div>');
    A.push(art('ARTICLE 24 — Dissolution',
      ['La Société est en liquidation dès l\'instant de sa dissolution quelle qu\'en soit la cause. À compter de la dissolution, la mention « Société en liquidation » ainsi que le nom du ou des liquidateurs doivent figurer sur tous les actes et documents émanant de la Société et destinés aux tiers.']));
    A.push(art('ARTICLE 25 — Liquidation',
      ['Le liquidateur est désigné par la collectivité des associés statuant comme en matière ordinaire ou, à défaut, par décision de justice. L\'acte de nomination définit ses pouvoirs et sa rémunération. La décision de clôture de la liquidation est prise par les associés après approbation des comptes définitifs de la liquidation.']));
    A.push('<div class="st-titre">TITRE SEPTIÈME — PUBLICITÉ · CONSTATATIONS</div>');
    A.push('<div class="st-art">ARTICLE 26 — Publicité</div><p>Tous pouvoirs sont donnés à '+esc(gerant)+' pour effectuer les formalités de publicité prescrites par la loi et, notamment, pour signer l\'avis à insérer dans un journal d\'annonces légales.</p>');
    A.push(art('ARTICLE 27 — Frais',
      ['À compter de l\'immatriculation au RCS, les frais, droits et honoraires auxquels donnera lieu la constitution de la Société seront amortis avant toute distribution de bénéfice.']));
    A.push(art('ARTICLE 28 — Contestations',
      ['Toutes les contestations qui pourraient s\'élever pendant la durée de la Société ou lors de sa liquidation, soit entre associés, soit entre le ou les gérants et la société, seront soumises à la juridiction des tribunaux compétents du lieu du siège social.']));
    A.push('<div class="st-art">ARTICLE 29 — Engagements contractés au nom de la Société avant son immatriculation</div><p>Néant.</p>');
    var signs=assoc.map(function(a){return '<div class="sg"><b>'+(esc((a.nom||'').trim())||'«associé»')+'</b>Associé — Signature</div>';}).join('');
    var fin='<div class="st-fin"><p>Fait à '+esc(x.villeSignature)+',</p><p>Le '+x.dateActe+',</p><p>en autant d\'exemplaires que nécessaire.</p>'
      +'<div class="st-sign"><div class="sg"><b>'+esc(gerant)+'</b>Le Gérant — Signature</div>'+signs+'</div></div>';
    return '<div class="st-doc">'+cover+'<div class="st-page">'+preambule+A.join('')+fin+'</div></div>';
  };

  /* ---------- Enregistrement des 3 modèles de statuts + choix par forme ---------- */
  if(window.DOC_MODELS){
    window.DOC_MODELS.statuts=[
      {id:'sas',label:'Statuts SAS',forme:'SAS',fn:function(d){return statutsSasHTML(d);}},
      {id:'sasu',label:'Statuts SASU',forme:'SASU',fn:function(d){return statutsSasuHTML(d);}},
      {id:'sci',label:'Statuts SCI',forme:'SCI',fn:function(d){return statutsSciHTML(d);}}
    ];
  }
  /* Tous les modèles restent proposés (choix), le modèle par défaut suit la forme du dossier */
  window.espDocModels=function(k,d){return (window.DOC_MODELS[k]||[]);};
  window.espDocModelId=function(d,k){
    var models=window.espDocModels(k,d);if(!models.length)return null;
    var sel=(d.docModel&&d.docModel[k]);
    if(sel&&models.some(function(m){return m.id===sel;}))return sel;
    var f=null;try{f=stDossData(d).forme;}catch(e){}
    if(f){var fm=models.filter(function(m){return m.forme===f;})[0];if(fm)return fm.id;}
    return models[0].id;
  };
})();
</script>
<script id="extra-docs-mod">
/* ===== Documents supplémentaires (modification / assemblée) : Cession d'actions ou de parts + Feuille de présence ===== */
(function(){
  function moisFr(){return ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'][new Date().getMonth()];}
  function dateJour(){return new Date().getDate()+' '+moisFr()+' '+new Date().getFullYear();}
  function titreDes(forme){return (forme==='SARL'||forme==='EURL'||forme==='SCI')?'PARTS SOCIALES':'ACTIONS';}
  function motDes(forme){return (forme==='SARL'||forme==='EURL'||forme==='SCI')?'parts sociales':'actions';}

  /* ---------- CESSION D'ACTIONS / DE PARTS (d'après modèle fourni) ---------- */
  window.cessionActionsHTML=function(d){
    var x=stDossData(d);var forme=x.forme;var des=motDes(forme);
    var rcsVille=x.rcsVille;
    var siren=((x.c.siren||x.s.siren||'')+'').trim()||'«SIREN»';
    var repr=x.president||'«représentant légal»';
    return '<div class="st-doc"><div class="st-page">'
      +'<div class="st-titre">ACTE DE CESSION DE '+titreDes(forme)+'</div>'
      +'<div style="text-align:center;font-size:11px;margin:-4px 0 14px">'+esc(x.denom)+' — '+esc(stFormeLabel(forme))+' au capital de '+(x.cap?stNum(x.cap):'«…»')+' euros — RCS de '+esc(rcsVille)+' n° '+esc(siren)+'</div>'
      +'<p><b>ENTRE LES SOUSSIGNÉS :</b></p>'
      +'<p><b>Le(s) cédant(s) :</b> «Civilité Nom Prénom du cédant», né(e) le «…» à «…», de nationalité «…», demeurant au «adresse du cédant» ;</p>'
      +'<p><b>Le(s) cessionnaire(s) :</b> «Civilité Nom Prénom du cessionnaire», né(e) le «…» à «…», de nationalité «…», demeurant au «adresse du cessionnaire» ;</p>'
      +'<p>concernant la société <b>'+esc(x.denom)+'</b>, '+esc(stFormeLabel(forme))+' au capital de '+(x.cap?stNum(x.cap):'«…»')+' euros, dont le siège social est situé '+esc(x.siegeComplet)+', immatriculée au RCS de '+esc(rcsVille)+' sous le numéro '+esc(siren)+', représentée par '+esc(repr)+'.</p>'
      +'<p style="margin-top:6px"><b>IL A ÉTÉ CONVENU CE QUI SUIT :</b></p>'
      +'<p><b>Article 1 — Cession.</b> Le cédant cède et transporte, sous les garanties ordinaires et de droit, au cessionnaire qui accepte, «nombre» '+des+' sur les «total» '+des+' qu\'il possède dans ladite société '+esc(x.denom)+'.</p>'
      +'<p><b>Article 2 — Propriété · Jouissance.</b> Le cessionnaire devient propriétaire des '+des+' cédées avec effet à compter du «date d\'effet». Il est subrogé dans tous les droits et obligations attachés aux '+des+' cédées.</p>'
      +'<p><b>Article 3 — Prix.</b> La présente cession est consentie et acceptée moyennant le prix de «montant en lettres» euros (« montant » €), que le cédant reconnaît avoir reçu du cessionnaire, dont quittance.</p>'
      +'<p><b>Article 4 — Agrément.</b> La présente cession a été autorisée par décision '+((forme==='SARL'||forme==='EURL'||forme==='SCI')?'collective des associés':'de la collectivité des associés')+' en date du «date», conformément aux statuts de la société.</p>'
      +'<p><b>Article 5 — Frais.</b> Les frais, droits et honoraires des présentes et tous ceux qui en seront la conséquence seront supportés par «le cessionnaire / la société».</p>'
      +'<div class="st-fin"><p>Fait à '+esc(x.villeSignature)+', le '+x.dateActe+',</p><p>en autant d\'originaux que de parties, plus un pour l\'enregistrement.</p>'
      +'<div class="st-sign"><div class="sg"><b>Le Cédant</b>Signature (précédée de « Bon pour cession »)</div><div class="sg"><b>Le Cessionnaire</b>Signature (précédée de « Bon pour acquisition »)</div></div></div>'
      +'</div></div>';
  };

  /* ---------- FEUILLE DE PRÉSENCE (assemblée générale) ---------- */
  window.feuillePresenceHTML=function(d){
    var x=stDossData(d);var forme=x.forme;var des=motDes(forme);
    var assoc=x.assoc.length?x.assoc:[{nom:''}];
    var total=x.totalParts||0;
    var rows=assoc.map(function(a){var p=Number(a.parts)||0;
      return '<tr><td class="al">'+(esc((a.nom||'').trim())||'«associé»')+'</td><td>'+(p||'«…»')+'</td><td>☐ Présent&nbsp;&nbsp;☐ Représenté</td><td></td></tr>';
    }).join('');
    return '<div class="st-doc"><div class="st-page">'
      +'<div class="st-hdr"><b>'+esc(x.denom)+'</b>'
      +'<div class="sub">'+esc(stFormeLabel(forme))+' au capital de '+(x.cap?stNum(x.cap):'«…»')+' euros</div>'
      +'<div class="sub">Siège social : '+esc(x.siegeComplet)+'</div></div>'
      +'<div class="st-titre">FEUILLE DE PRÉSENCE</div>'
      +'<p style="text-align:center;margin:-4px 0 12px">Assemblée générale du «date de l\'assemblée» — «heure» — «lieu de l\'assemblée»</p>'
      +'<table class="st-tbl"><thead><tr><th class="al">Associé (nom, prénom ou dénomination)</th><th>Nombre de '+des+'</th><th>Présence</th><th>Signature</th></tr></thead><tbody>'
      +rows
      +'<tr class="tot"><td class="al">TOTAL</td><td>'+(total||'«…»')+'</td><td></td><td></td></tr>'
      +'</tbody></table>'
      +'<p style="margin-top:14px">La présente feuille de présence, certifiée exacte et sincère, a été arrêtée à la somme de '+(total||'«…»')+' '+des+' représentées, sur un total de '+(total||'«…»')+' '+des+' composant le capital social.</p>'
      +'<div class="st-fin"><p>Fait à '+esc(x.villeSignature)+', le «date»</p>'
      +'<div class="st-sign"><div class="sg"><b>'+esc(x.president)+'</b>'+((forme==='SARL'||forme==='EURL'||forme==='SCI')?'Le Gérant':'Le Président')+' de séance — Signature</div><div class="sg"><b>Le Secrétaire</b>Signature</div></div></div>'
      +'</div></div>';
  };

  /* ---------- Enregistrement : nouveaux types de documents OPTIONNELS (opt-in) ---------- */
  try{
    if(typeof ESP_DOCS!=='undefined'){
      if(!ESP_DOCS.some(function(x){return x.k==='cession';})) ESP_DOCS.push({k:'cession',l:'Cession d\'actions / de parts',prix:120,optional:true});
      if(!ESP_DOCS.some(function(x){return x.k==='presence';})) ESP_DOCS.push({k:'presence',l:'Feuille de présence (assemblée)',prix:0,optional:true});
    }
  }catch(e){}
  if(window.DOC_MODELS){
    window.DOC_MODELS.cession=[{id:'standard',label:'Cession d\'actions / de parts — modèle',fn:function(d){return cessionActionsHTML(d);}}];
    window.DOC_MODELS.presence=[{id:'standard',label:'Feuille de présence — modèle',fn:function(d){return feuillePresenceHTML(d);}}];
  }

  /* espDocReq : les documents « optionnels » sont opt-in (docsInclus), les autres requis par défaut (docsExclus) */
  window.espDocReq=function(d,k){
    var dc=(typeof ESP_DOCS!=='undefined'?ESP_DOCS:[]).filter(function(x){return x.k===k;})[0];
    if(dc&&dc.optional){return !!(d&&d.docsInclus&&d.docsInclus[k]);}
    return !(d&&d.docsExclus&&d.docsExclus[k]);
  };
  function toggleReq(id,k){
    var d=espDoss().find(function(x){return x.id===id;});if(!d)return null;
    var dc=(typeof ESP_DOCS!=='undefined'?ESP_DOCS:[]).filter(function(x){return x.k===k;})[0];
    if(dc&&dc.optional){d.docsInclus=d.docsInclus||{};if(d.docsInclus[k])delete d.docsInclus[k];else d.docsInclus[k]=true;}
    else{d.docsExclus=d.docsExclus||{};if(d.docsExclus[k])delete d.docsExclus[k];else d.docsExclus[k]=true;}
    save();return d;
  }
  window.espDocToggleReq=function(id,k){if(toggleReq(id,k))render();};
  window.espDocToggleReqM=function(id,k){if(toggleReq(id,k)&&typeof espDocsModal==='function')espDocsModal(id);};
})();
</script>
<script id="etat-lieux-mod">
/* ===== Document supplémentaire : État des lieux antérieurs (attestation transfert de siège) ===== */
(function(){
  function moisFr(){return ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'][new Date().getMonth()];}
  function dateJour(){return new Date().getDate()+' '+moisFr()+' '+new Date().getFullYear();}

      +'<div class="sub">Au capital de '+(x.cap?stNum(x.cap):'«…»')+' euros</div>'
      +'<div class="sub">Siège social : '+esc(x.siegeComplet)+'</div>'
      +'<div class="sub">RCS : en cours d\'immatriculation</div></div>'
      +'<div class="st-titre">ÉTAT DES LIEUX ANTÉRIEURS</div>'
      +'<p style="margin-top:18px">Je soussigné(e) <b>'+esc(x.president)+'</b>, en qualité de '+qualite+' de la '+esc(forme)+' '+esc(x.denom)+',</p>'
      +'<p style="margin-top:10px">Certifie que la société a été créée au «adresse, code postal et ville de l\'ancien siège social» en date du «date de début d\'activité» et a été transférée au «adresse, code postal et ville du nouveau siège» en date du «date du transfert».</p>'
      +'<div class="st-fin" style="margin-top:34px"><p>Fait à '+esc(ville)+',</p><p>Le «date du procès-verbal».</p>'
      +'<div class="st-sign" style="margin-top:28px"><div class="sg"><b>'+esc(x.president)+'</b>Le '+qualite+' — Signature</div></div></div>'
      +'</div></div>';
  };
  try{
    if(typeof ESP_DOCS!=='undefined' && !ESP_DOCS.some(function(x){return x.k==='etatlieux';}))
      ESP_DOCS.push({k:'etatlieux',l:'État des lieux antérieurs (transfert de siège)',prix:0,optional:true});
  }catch(e){}
  if(window.DOC_MODELS) window.DOC_MODELS.etatlieux=[{id:'standard',label:'État des lieux antérieurs — modèle',fn:function(d){return etatLieuxHTML(d);}}];
})();
</script>
<script id="more-models-mod">
/* ===== Statuts SARL + EURL, Rapport de gestion, Procès-verbal d'assemblée ===== */
(function(){
  function moisFr(){return ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'][new Date().getMonth()];}
  function dateJour(){return new Date().getDate()+' '+moisFr()+' '+new Date().getFullYear();}
  function art(t,ps){return '<div class="st-art">'+t+'</div>'+ps.map(function(p){return '<p>'+p+'</p>';}).join('');}

  /* ---------- STATUTS SARL ---------- */
  window.statutsSarlHTML=function(d){
    var x=stDossData(d);var c=x.c;

    A.push(art('ARTICLE 21 — Dissolution · Liquidation',['La société est dissoute dans les cas prévus par la loi ou par décision collective extraordinaire des associés. La collectivité des associés nomme un ou plusieurs liquidateurs. Le produit net de la liquidation est employé au remboursement du capital, le surplus étant réparti entre les associés proportionnellement au nombre de parts.']));

     +'<div class="esp-from"><span class="av" style="background:linear-gradient(160deg,#4a4034,#2c271f)">'+initials(dossierClients(d))+'</span>'

  };

  /* ---------- OCR ---------- */
  function tessSrc(){return (DB.parametres&&DB.parametres.ocrCdn)||'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';}

  function extractTj(s){var out=[],m,re=/\(((?:\\.|[^\\()])*)\)\s*Tj/g;while((m=re.exec(s)))out.push(m[1]);var re2=/\[((?:[^\]])*)\]\s*TJ/g;while((m=re2.exec(s))){var mm,r3=/\(((?:\\.|[^\\()])*)\)/g;while((mm=r3.exec(m[1])))out.push(mm[1]);}return out.join(' ').replace(/\\([()\\])/g,'$1');}

  /* ---------- Analyse (parser FR) ---------- */
  window.espParseDoc=function(text){
    var out={};var flat=(''+text).replace(/\s+/g,' ');
    var nb=flat.match(/n[ée]e?\s*(?:le)?\s*[:\-]?\s*(\d{1,2}[\/. ]\d{1,2}[\/. ]\d{2,4})/i);if(nb)out.dateNaissance=nb[1].replace(/[.\s]/g,'/');
    var lb=flat.match(/lieu de naissance\s*[:\-]?\s*([A-Za-zÀ-ÿ'’\- ]{2,32})/i)||flat.match(/\d{1,2}[\/. ]\d{1,2}[\/. ]\d{2,4}\s+[àa]\s+([A-Za-zÀ-ÿ'’\- ]{2,32})/i);
    if(lb)out.lieuNaissance=lb[1].trim().split(/\s+(?:nationalit|n[°o]\b|carte|r[ée]publique|sexe|taille|valable|le\b|en\b)/i)[0].replace(/\s+(en|au|à|de)$/i,'').trim();
    var nn=flat.match(/\bnom\s*(?:de naissance|d.usage)?\s*[:\-]\s*([A-ZÀ-Þ][A-ZÀ-Þ'’\- ]{1,30})/i);if(nn)out.nom=nn[1].trim().replace(/\s+[A-ZÀ-Þ]$/,'').replace(/\s+(pr[ée]nom|n[ée]|sexe|nationalit).*/i,'').trim();
    var pn=flat.match(/pr[ée]noms?\s*[:\-]\s*([A-ZÀ-Þ][A-Za-zÀ-ÿ'’\- ,]{1,30})/i);if(pn)out.prenom=pn[1].trim().split(/[ ,]/)[0];
    if(/nationalit[ée]\s*[:\-]?\s*fran|r[ée]publique fran[çc]aise/i.test(flat))out.nationalite='française';
    else{var na=flat.match(/nationalit[ée]\s*[:\-]?\s*([A-Za-zÀ-ÿ]{3,20})/i);if(na)out.nationalite=na[1].toLowerCase();}
    if(/carte nationale d.identit|carte d.identit|\bCNI\b/i.test(flat))out.typePiece="Carte nationale d'identité";
    else if(/passeport|passport/i.test(flat))out.typePiece='Passeport';
    else if(/titre de s[ée]jour|carte de s[ée]jour|permis de s[ée]jour/i.test(flat))out.typePiece='Titre de séjour';
    var num=flat.match(/(?:n[°o]|num[ée]ro|no)\s*[:\-]?\s*([A-Z0-9]{6,14})/i);if(num)out.numPiece=num[1];
    if(/autoris[ea].{0,14}travail|travail\s+autoris|autoris.{0,4}[àa]\s+travailler|salari[ée]|vie priv[ée]e et familiale/i.test(flat))out.travailAutorise=true;
    var adr=flat.match(/\b(\d{1,4}(?:\s*(?:bis|ter))?\s+(?:rue|avenue|av\.?|bd|boulevard|impasse|all[ée]e|chemin|place|route|quai|cours)\s+[A-Za-zÀ-ÿ'’\- ]{2,40})/i);
    if(adr){out.adresse=adr[1].replace(/\s+/g,' ').trim();var cp=flat.match(/\b(\d{5})\s+([A-ZÀ-Þ][A-Za-zÀ-ÿ'’\- ]{2,30})/);if(cp)out.adresse+=', '+cp[1]+' '+cp[2].trim();out.adresse=out.adresse.replace(/\s+(montant|total|eur|euros?|facture|client|solde|tva|edf|n[°o])\b.*$/i,'').trim();}
    var rf=flat.match(/revenu fiscal de r[ée]f[ée]rence\s*[:\-]?\s*([\d  .]{3,12})/i);if(rf)out.revenuFiscal=(rf[1].replace(/[ .]/g,' ').trim())+' €';
    var dom=flat.match(/(?:soci[ée]t[ée] de )?domiciliat(?:aire|ion)\s*[:\-]?\s*([A-Za-zÀ-ÿ0-9'’&\- ]{2,40})/i);if(dom)out.domiciliataire=dom[1].trim();
    return out;
  };
  function assign(kind,parsed,ex){
    function fill(k){if(parsed[k]!=null&&parsed[k]!==''&&!(''+(ex[k]||'')).trim())ex[k]=parsed[k];}
    function force(k){if(parsed[k]!=null&&parsed[k]!=='')ex[k]=parsed[k];}
    if(kind==='identite'){fill('nom');fill('prenom');fill('dateNaissance');fill('lieuNaissance');fill('nationalite');force('typePiece');force('numPiece');if(parsed.travailAutorise)ex.travailAutorise=true;}
    else if(kind==='edf'){force('adresse');}
    else if(kind==='impot'){force('revenuFiscal');fill('nom');}
    else if(kind==='domiciliation'){force('siege');force('domiciliataire');}
  }
  window.espVerifAnalyser=function(id){
    var d=espDoss().find(function(x){return x.id===id;});if(!d)return;var v=espVerifState(d);v.extract=v.extract||{};
    try{var dm=espDemandeDe(d);var src=(dm&&(dm.rawBody||dm.message))||'';if(typeof formParse==='function'&&src){var p=formParse(src);
      var map={prenom:'prenom',nom:'nom',naissance:'dateNaissance',lieuNaissance:'lieuNaissance',pays:'paysNaissance',nationalite:'nationalite',adressePerso:'adresse',siege:'siege',civilite:'civilite'};
      for(var kk in map){if(p[kk]&&!(''+(v.extract[map[kk]]||'')).trim())v.extract[map[kk]]=(kk==='civilite'?(/mme|madame|f\b/i.test(p[kk])?'Mme':'M.'):p[kk]);}}}catch(e){}
    var c=clientById((d.clientIds||[])[0])||{};var assoc=(c.associes||[]).filter(function(a){return a&&(''+(a.nom||'')).trim();});var pres=assoc.filter(function(a){return (''+(a.nom||'')).trim()===(''+(c.president||'')).trim();})[0]||assoc[0]||{};
    function setIf(k,val){if(val&&!(''+(v.extract[k]||'')).trim())v.extract[k]=val;}
    var full=((c.president||pres.nom||'')+'').trim();var pp=full.split(/\s+/).filter(Boolean);
    setIf('civilite','M.');if(pp.length>=2){setIf('prenom',pp.slice(0,-1).join(' '));setIf('nom',pp[pp.length-1]);}else if(full)setIf('nom',full);
    setIf('dateNaissance',pres.naissance||'');setIf('lieuNaissance',pres.lieuNaissance||'');setIf('paysNaissance','France');setIf('nationalite','française');
    setIf('adresse',((pres.adresse||c.adresse||'')+'').trim());setIf('siege',((c.siege||(DB.societe&&DB.societe.adresse)||'')+'').trim());
    var pcs=(typeof DIRIGEANT_PIECES!=='undefined'?DIRIGEANT_PIECES:[]).map(function(pc){return {k:pc.k,st:espPieceState(d,pc.k)};}).filter(function(x){return x.st&&x.st.data;});
    if(!pcs.length){save();toast('Analyse : informations reprises du questionnaire. Déposez les pièces (identité, domiciliation, EDF, impôt) pour l\'OCR.');espVerifRender(id);return;}
    var on=true;try{on=navigator.onLine;}catch(e){}
    toast('🪄 Analyse OCR des pièces en cours…');
    var left=pcs.length,got=false;
    pcs.forEach(function(pc){
      window.espOcrRead(pc.st.data,function(text){
        if(text&&text.replace(/\s/g,'').length>8){got=true;try{assign(pc.k,window.espParseDoc(text),v.extract);}catch(e){}}
        if(--left<=0){save();toast(got?'✅ Analyse terminée — informations extraites des pièces et reportées dans les documents.':'Pièces non lisibles par OCR'+(on?'':' (hors ligne)')+' — infos reprises du questionnaire.');espVerifRender(id);}
      });
    });
  };
})();
</script>

<script id="a4-pages-mod">
/* ===== Vue A4 paginée : le contenu se répartit en pages A4 distinctes (comme à l'impression) ===== */
(function(){
  window.a4Paginate=function(html){
    try{
      var MM=3.7795, marg=20, pageH=297;
      var contentWpx=(210-2*marg)*MM;
      var contentHpx=(pageH-2*marg)*MM;
      var tmp=document.createElement('div');tmp.innerHTML=html;
      var root=tmp.firstElementChild;if(!root)return html;
      var wrap=(root.className.split(/\s+/).filter(function(c){return c==='st-doc'||c==='ft-doc'||c==='dg-page';})[0])||'st-doc';
      var sections=[];
      if(root.classList.contains('st-doc')){
        Array.prototype.forEach.call(root.children,function(ch){
          if(ch.classList.contains('st-cover'))sections.push({cover:ch});
          else if(ch.classList.contains('st-page'))sections.push({blocks:Array.prototype.slice.call(ch.children)});
          else sections.push({blocks:[ch]});
        });
      } else { sections.push({blocks:Array.prototype.slice.call(root.children)}); }
      var meas=document.createElement('div');meas.className=wrap;
      meas.style.cssText='position:fixed;left:-99999px;top:0;width:'+contentWpx+'px;visibility:hidden';
      document.body.appendChild(meas);
      function measure(node){meas.appendChild(node);var r=node.getBoundingClientRect();var cs=getComputedStyle(node);var h=r.height+(parseFloat(cs.marginTop)||0)+(parseFloat(cs.marginBottom)||0);meas.removeChild(node);return h;}
      var pages=[];
      sections.forEach(function(sec){
        if(sec.cover){pages.push({cover:sec.cover});return;}
        var cur=[],curH=0;
        sec.blocks.forEach(function(node){
          var h=measure(node.cloneNode(true));
          if(h>contentHpx){ if(cur.length){pages.push({blocks:cur});cur=[];curH=0;} pages.push({blocks:[node],tall:true}); return; }
          if(curH+h>contentHpx&&cur.length){pages.push({blocks:cur});cur=[];curH=0;}
          cur.push(node);curH+=h;
        });
        if(cur.length)pages.push({blocks:cur});
      });
      meas.remove();
      if(!pages.length)return html;
      var n=pages.length;
      var out='<div class="a4-doc" data-pages="'+n+'">';
      pages.forEach(function(pg,i){
        var num='<div class="a4-num">'+(i+1)+' / '+n+'</div>';
        if(pg.cover){ out+='<div class="a4-page a4-cover"><div class="'+wrap+'">'+pg.cover.outerHTML+'</div>'+num+'</div>'; }
        else { var inner=pg.blocks.map(function(x){return x.outerHTML;}).join(''); out+='<div class="a4-page'+(pg.tall?' a4-tall':'')+'"><div class="a4-inner '+wrap+'">'+inner+'</div>'+num+'</div>'; }
      });
      out+='</div>';
      return out;
    }catch(e){ return html; }
  };

  /* Aperçus paginés */
  window.espDocVoir=function(id,k){
    var d=espDoss().find(function(x){return x.id===id;});var dc=(typeof ESP_DOCS!=='undefined'?ESP_DOCS:[]).find(function(x){return x.k===k;})||{k:k,l:k};
    openModal(esc(dc.l),'<div class="fv-view-scroll" style="background:#e7e0d1"><div class="doc-gen">'+a4Paginate(espDocHTML(d,dc))+'</div></div>',
      '<button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-pri" onclick="espDocPrint()">Imprimer</button>');
  };
  window.espFicheTechnique=function(id){
    var d=espDoss().find(function(x){return x.id===id;});if(!d)return;
    openModal('Fiche technique — '+esc(dossierClients(d)),
      '<div class="fv-view-scroll" style="background:#e7e0d1"><div class="doc-gen">'+a4Paginate(ficheTechniqueHTML(d))+'</div></div>',
      '<button class="btn btn-ghost" onclick="closeModal()">Fermer</button><button class="btn btn-pri" onclick="espDocPrint()">Imprimer</button>');
  };

  /* Ajuste la vue paginée à la largeur de la fenêtre */
  window.docFitView=function(){
    var w=document.querySelector('#ov .fv-view-scroll');if(!w)return;
    var page=w.querySelector('.doc-gen > .a4-doc, .doc-gen > .st-doc, .doc-gen > .dg-page, .doc-gen > .ft-doc');if(!page)return;
    var nat=page.offsetWidth||794;
    var s=Math.min(1,(w.clientWidth-4)/nat);
    page.style.transformOrigin='top left';
    page.style.transform='scale('+s+')';
    w.style.height=((page.offsetHeight*s)+14)+'px';
  };
})();
</script>

  window.espEdDoc=function(id,k){window.__edDoc=k;espEdRender(id);};
  window.espEdRefresh=function(id){clearTimeout(window.__edT);window.__edT=setTimeout(function(){var pv=document.getElementById('de-preview');if(!pv)return;var d=espDoss().find(function(x){return x.id===id;});if(!d)return;pv.innerHTML=espEdPreviewHTML(d);espEdFit();},220);};
  window.espEdSet=function(id,grp,key,val){
    var d=espDoss().find(function(x){return x.id===id;});if(!d)return;var c=cli(d);
    if(grp==='dv'){
      c.docVars=c.docVars||{};c.docVars[key]=val;
    } else if(grp==='c'){
      if(key==='capital')c.capital=parseInt((''+val).replace(/[^0-9]/g,''),10)||0;
      else if(key==='activites')c.activites=(''+val).split(/[,;\/]+/).map(function(s){return s.trim();}).filter(Boolean);
      else if(key==='forme')c.forme=(''+val).toUpperCase();
      else c[key]=val;
    } else {
      d.verif=d.verif||{};d.verif.extract=d.verif.extract||{};var ex=d.verif.extract;
      if(key==='civilite')ex.civilite=(/mme|madame|f/i.test(val)?'Mme':'M.');else ex[key]=val;
      if(key==='prenom'||key==='nom'){var full=((ex.prenom||'')+' '+(ex.nom||'')).trim();if(full){var old=c.president;c.president=full;
        if(c.associes&&c.associes.length){var i=c.associes.map(function(a){return (''+(a.nom||'')).trim();}).indexOf((''+(old||'')).trim());if(i>=0)c.associes[i].nom=full;else c.associes[0].nom=full;}}}
    }
    save();espEdRefresh(id);
  };
  window.espEdAssoc=function(id,i,key,val){
    var d=espDoss().find(function(x){return x.id===id;});if(!d)return;var c=cli(d);c.associes=c.associes||[];if(!c.associes[i])c.associes[i]={};
    if(key==='parts'||key==='apport')c.associes[i][key]=parseInt((''+val).replace(/[^0-9]/g,''),10)||0;
    else{var old=c.associes[i].nom;c.associes[i][key]=val;if(key==='nom'&&(''+(old||'')).trim()===(''+(c.president||'')).trim())c.president=val;}
    save();espEdRefresh(id);
  };
  window.espEdAssocAdd=function(id){var d=espDoss().find(function(x){return x.id===id;});var c=cli(d);c.associes=c.associes||[];c.associes.push({nom:'',parts:0,apport:0});save();espEdRender(id);};
  window.espEdAssocDel=function(id,i){var d=espDoss().find(function(x){return x.id===id;});var c=cli(d);if(c.associes)c.associes.splice(i,1);save();espEdRender(id);};
  window.espEdPrint=function(){var el=document.querySelector('#de-preview .doc-gen');if(!el)return;if(typeof FactureVente!=='undefined'&&FactureVente.injectCSS)FactureVente.injectCSS();var pa=document.getElementById('fv-printarea');if(!pa){pa=document.createElement('div');pa.id='fv-printarea';document.body.appendChild(pa);}pa.innerHTML='<div class="doc-gen">'+el.innerHTML+'</div>';setTimeout(function(){window.print();},120);};
  window.addEventListener('resize',function(){try{espEdFit();}catch(e){}});
})();
</script>
<style id="doc-editor-css">

.de-head b{font:600 15px/1.2 Georgia,"Times New Roman",serif;color:var(--ink,#2a2117)}

.de-tab{border:1px solid var(--line,#e0d8c6);background:transparent;color:var(--ink,#2a2117);font:600 11.5px/1 inherit;padding:6px 10px;border-radius:7px;cursor:pointer}
.de-tab.on{background:var(--accent,#8a6d3b);color:#fff;border-color:var(--accent,#8a6d3b)}
.de-sp{margin-left:auto;display:flex;gap:8px}
.de-body{flex:1 1 auto;display:grid;grid-template-columns:360px 1fr;grid-template-rows:minmax(0,1fr);overflow:hidden;min-height:0}
.de-side{overflow-y:auto;min-height:0;height:100%;padding:16px 16px 64px;background:var(--panel,#f6f1e6);border-right:1px solid var(--line,#e0d8c6);-webkit-overflow-scrolling:touch}
.de-grp{margin-bottom:18px}
.de-grp-h{font:700 11px/1 inherit;letter-spacing:1px;text-transform:uppercase;color:var(--accent,#8a6d3b);border-bottom:1px solid var(--line,#e0d8c6);padding-bottom:6px;margin:0 0 10px}
.de-l{display:block;font-size:11px;font-weight:600;color:var(--ink-2,#5b5040);margin:8px 0 3px}
.de-i,.de-side select,.de-side textarea{width:100%;padding:8px 10px;border:1px solid var(--line-2,#d9ccb2);border-radius:8px;background:#fff;color:var(--ink,#2a2117);font:inherit;font-size:13px;box-sizing:border-box;outline:none}
.de-i:focus,.de-side select:focus,.de-side textarea:focus{border-color:var(--accent,#8a6d3b)}
.de-row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.de-assoc{position:relative;border:1px solid var(--line,#e0d8c6);border-radius:8px;padding:10px;margin-bottom:8px;background:#fff}
.de-ax{position:absolute;top:6px;right:6px;border:0;background:transparent;color:#b0442f;cursor:pointer;font-size:15px;line-height:1}
.de-add{width:100%;border:1px dashed var(--line-2,#d9ccb2);background:transparent;color:var(--ink-2,#5b5040);padding:9px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12.5px}
.de-add:hover{border-color:var(--accent,#8a6d3b);color:var(--accent,#8a6d3b)}
.de-note2{font-size:10.5px;color:var(--ink-3,#8a7d69);margin-top:4px;font-style:italic}
.de-preview{overflow:auto;min-height:0;height:100%;background:var(--paper-desk,#e7ded0);padding:22px;min-width:0}
@media(max-width:860px){.de-body{grid-template-columns:1fr;grid-template-rows:auto 1fr}.de-side{border-right:0;border-bottom:1px solid var(--line,#e0d8c6);max-height:42vh}}
@media print{.a4-doc{transform:none!important}}
</style>
